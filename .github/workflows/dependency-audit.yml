name: Weekly Dependency Audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run audit
        id: audit
        run: |
          set +e
          pnpm audit --json > audit-results.json 2>&1
          AUDIT_EXIT=$?
          VULN_COUNT=$(cat audit-results.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('total',0))" 2>/dev/null || echo "unknown")
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "audit_exit=$AUDIT_EXIT" >> $GITHUB_OUTPUT

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-${{ github.run_id }}
          path: audit-results.json
          retention-days: 30

      - name: Fail on high/critical vulnerabilities
        run: pnpm audit --audit-level=high
